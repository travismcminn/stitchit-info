<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SWF Sales Deck</title>

<style>
  :root{
    --slide-w: 1056; /* 11in at 96dpi */
    --slide-h: 816;  /* 8.5in at 96dpi */
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    background:#e9e9e9;
    font-family:Arial, Helvetica, sans-serif;
  }

  .deck{
    width:100%;
    padding:18px 0 40px;
  }

  .slide-shell{
    width:min(100%, 1100px);
    margin:0 auto 18px;
    background:#fff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 8px 24px rgba(0,0,0,.10);
  }

  .slide-frame-wrap{
    position:relative;
    width:100%;
    overflow:hidden;
    background:#fff;
  }

  .slide-frame{
    display:block;
    width:calc(var(--slide-w) * 1px);
    height:calc(var(--slide-h) * 1px);
    border:0;
    transform-origin:top left;
  }

  @media (max-width: 768px){
    .deck{
      padding:10px 0 24px;
    }

    .slide-shell{
      margin:0 auto 12px;
      border-radius:0;
      box-shadow:none;
    }
  }
</style>
</head>
<body>

<div class="deck">

  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="KE-page.html" loading="lazy"></iframe></div></section>
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="KX-page.html" loading="lazy"></iframe></div></section>
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="KX Dual-Page.html" loading="lazy"></iframe></div></section>
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="KX Single-Page.html" loading="lazy"></iframe></div></section>

  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="ES Full Size-Page.html" loading="lazy"></iframe></div></section>
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="ES-T1501C-Page.html" loading="lazy"></iframe></div></section>
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="MAS-12-Page.html" loading="lazy"></iframe></div></section>
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="Sunny 7-Page.html" loading="lazy"></iframe></div></section>

  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="install-training-page.html" loading="lazy"></iframe></div></section>
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="byld-roi-page.html" loading="lazy"></iframe></div></section>
  
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="trade-in-quote-page.html" loading="lazy"></iframe></div></section>
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="stitchmaker-page.html" loading="lazy"></iframe></div></section>
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="mighty-hoop-Page.html" loading="lazy"></iframe></div></section>
  <section class="slide-shell"><div class="slide-frame-wrap"><iframe class="slide-frame" src="stitchit-supplies-page.html" loading="lazy"></iframe></div></section>

</div>

<script>
  (function () {
    const SLIDE_W = 1056;
    const SLIDE_H = 816;

    function sizeSlides() {
      document.querySelectorAll('.slide-frame-wrap').forEach((wrap) => {
        const iframe = wrap.querySelector('.slide-frame');
        const availableWidth = wrap.clientWidth;
        const scale = availableWidth / SLIDE_W;

        iframe.style.transform = `scale(${scale})`;
        wrap.style.height = `${SLIDE_H * scale}px`;
      });
    }

    window.addEventListener('load', sizeSlides);
    window.addEventListener('resize', sizeSlides);
  })();
</script>

</body>
</html>
